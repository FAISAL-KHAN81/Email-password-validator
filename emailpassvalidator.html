<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Password Validator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
        }

        .container{
            width:100%;
            max-width:400px;
            padding:20px;
        }

        form{
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#555;
        }

        input{
            width:100%;
            padding:12px;
            border:2px solid #ccc;
            border-radius:6px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#007bff;
        }

        small{
            display:block;
            margin-top:5px;
            color:red;
            font-size:14px;
            min-height:18px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            background:#007bff;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0056b3;
        }

        /* For JavaScript validation */
        .success{
            border-color:green;
        }

        .error{
            border-color:red;
        }
        #resultMessage {
          color: red;
          margin-top: 20px;
          text-align: center;
          font-size: 14px;
          font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <form autocomplete="off" id="validatorForm">
            <h2>Login Form</h2>

            <div class="input-group">
                <label for="email">Email</label>
                <input autocomplete="off" type="text" id="email" placeholder="Enter your email">
                <small id="emailError"></small>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
                <small id="passwordError"></small>
            </div>

            <button type="submit">Validate</button>
        </form>
        <div id = "resultMessage">
        </div>
    </div>

    <script>
        // Write your validation JavaScript here


        let mail= document.querySelector("#email");
        let password = document.querySelector("#password");

        let form = document.querySelector("form");

        form.addEventListener("submit", function(dets){
          dets.preventDefault();
         document.querySelector("#emailError").textContent = "";
         document.querySelector("#passwordError").textContent = "";

          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

         let emailans = emailRegex.test(email.value);
         let passwordans =passwordRegex.test(password.value);

         let isValid = true;

         if(!emailans){
          document.querySelector("#emailError").textContent= "Email is incorrect";

          isValid = false;
         }
         if(!passwordans){
           document.querySelector("#passwordError").textContent= "Password is incorrect";
           isValid = false
         }
         if(isValid){
          document.querySelector("#resultMessage").textContent = "Every thing is correct ";
         }
        });

    </script>

</body>
</html>
